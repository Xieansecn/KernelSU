name: build ranchu kernel for KernelSU (x86_64)
on:
  workflow_dispatch:
    inputs:
      vanilla:
        description: 'Build vanilla kernel (without patches)'
        type: boolean
        default: false

      lto:
        description: 'Enable LTO (Link Time Optimization)'
        type: choice
        options:
          - 'none'
          - 'thin'
          - 'full'
        default: none
      
      patch_file:
        description: 'Patch file for kernel (include patchs directory, if not build vanilla kernel)'
        type: string
        default: 'android15-6.6_x86_64.patch'

      kernelsu_patch:
        description: 'Patch file for KernelSU (include patchs directory, if not build vanilla kernel)'
        type: boolean
        default: true

      KSU_EXPECTED_SIZE:
        description: 'Kernel certificate size [KSU_EXPECTED_SIZE] (请正确填写否则管理器不能使用，留空则使用官方默认值)'
        required: false
        type: string

      KSU_EXPECTED_HASH:
        description: 'Kernel certificate hash [KSU_EXPECTED_HASH] (请正确填写否则管理器不能使用，留空则使用官方默认值)'
        required: false
        type: string

jobs:
  build-ranchu-x86_64-kernel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create working directory
        run: |
            mkdir -p ${{ github.workspace }}/common-android15-6.6

      - name: Restore kernel source cache
        id: cache-kernel
        uses: actions/cache@v4
        with:
          path: common-android15-6.6/.repo
          key: kernel-sources-x86_64-v1
          restore-keys: |
            kernel-sources-x86_64-

      - name: Install dependencies
        run: |
            sudo apt update && sudo apt install -y git python3 curl rsync zip unzip cpio libncurses-dev libelf-dev bc flex bison build-essential libssl-dev

      - name: Configure git identity
        run: |
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install repo tool
        run: |
            sudo curl -sS https://storage.googleapis.com/git-repo-downloads/repo -o /usr/local/bin/repo
            sudo chmod a+x /usr/local/bin/repo

      - name: Sync kernel sources with repo
        working-directory: ${{ github.workspace }}/common-android15-6.6
        run: |
            repo init -u https://android.googlesource.com/kernel/manifest -b common-android15-6.6 --depth=1
            cp ${{ github.workspace }}/manifests/manifest_13070261.xml .repo/manifests/
            repo init -m manifest_13070261.xml
            repo sync -c --no-tags --no-clone-bundle -j$(nproc)

      - name: Add KernelSU
        if: ${{ inputs.vanilla == false }}
        working-directory: ${{ github.workspace }}/common-android15-6.6/common
        run: |
            curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s main
            if [ "${{ inputs.kernelsu_patch }}" = true ]; then
              cd KernelSU
              git apply ${{ github.workspace }}/patchs/kernelSU.patch
              cd ${{ github.workspace }}/common-android15-6.6/common
              git add -A
              git commit -m "Add KernelSU with patch"
            else
              echo "Skip KernelSU patch!"
              git add -A
              git commit -m "Add KernelSU"
            fi

      - name: Override cert hash
        if: ${{ inputs.KSU_EXPECTED_SIZE != '' && inputs.KSU_EXPECTED_HASH != '' }}
        working-directory: ${{ github.workspace }}/common-android15-6.6/common/KernelSU
        run: |
            sed -i "s/^KSU_EXPECTED_SIZE := .*/KSU_EXPECTED_SIZE := ${{ inputs.KSU_EXPECTED_SIZE }}/" kernel/Kbuild
            sed -i "s/^KSU_EXPECTED_HASH := .*/KSU_EXPECTED_HASH := ${{ inputs.KSU_EXPECTED_HASH }}/" kernel/Kbuild
            git add -A
            git commit -m "Override kernel certificate info with user-provided values"

      - name: Patch kernel sources
        if: ${{ inputs.vanilla == false }}
        working-directory: ${{ github.workspace }}/common-android15-6.6/common
        run: |
            git apply ${{ github.workspace }}/patchs/${{ inputs.patch_file }}
            git add -A
            git commit -m "Add x86_64 compile fixes for Android15-6.6 on kernel sources"

      - name: Build kernel
        working-directory: ${{ github.workspace }}/common-android15-6.6
        run: |
            tools/bazel run --verbose_failures --config=fast --config=stamp --lto=${{ inputs.lto }} //common-modules/virtual-device:virtual_device_x86_64_dist -- --dist_dir=virt

      - name: Upload Kernel Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.vanilla && 'ranchu-x86_64-kernel-vanilla' || 'ranchu-x86_64-kernel-KernelSU' }}
          path: ${{ github.workspace }}/common-android15-6.6/virt/bzImage

      - name: Upload Kernel Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vmlinux
          path: |
            ${{ github.workspace }}/common-android15-6.6/virt/vmlinux
            ${{ github.workspace }}/common-android15-6.6/virt/vmlinux.symvers

      - name: Upload Kernel Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: System.map
          path: ${{ github.workspace }}/common-android15-6.6/virt/System.map

